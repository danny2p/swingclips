<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stop Sound Options</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      margin: 0;
      padding: 24px;
      box-sizing: border-box;
    }
    h1 { font-size: 1.1rem; color: #aaa; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
    p.current { font-size: 0.75rem; color: #555; margin: 0 0 24px; }
    button {
      width: 320px;
      padding: 16px 24px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    button:hover { background: #2a2a2a; }
    button:active { background: #333; }
    button .label { display: block; font-size: 0.75rem; color: #666; font-weight: 400; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Recording Stopped — Sound Options</h1>
  <p class="current">Current: descending sawtooth G3 → E3 → C3</p>

  <button onclick="playCurrent()">
    ▶ Current (for reference)
    <span class="label">Descending sawtooth — G3, E3, C3</span>
  </button>

  <button onclick="playOption1()">
    ▶ Option 1 — Soft thud
    <span class="label">Single low sine pulse, quick fade. Subtle and clean.</span>
  </button>

  <button onclick="playOption2()">
    ▶ Option 2 — Tape stop
    <span class="label">Pitch-bends down like a tape machine slowing to a halt.</span>
  </button>

  <button onclick="playOption3()">
    ▶ Option 3 — Two-tone confirm
    <span class="label">Short descending major third (sine). Friendly, not alarming.</span>
  </button>

  <button onclick="playOption4()">
    ▶ Option 4 — Click + low tone
    <span class="label">Sharp click followed by a brief low resonant tone.</span>
  </button>

  <button onclick="playOption5()">
    ▶ Option 5 — Soft chime down
    <span class="label">Three quick triangle-wave notes falling, gentle and musical.</span>
  </button>

  <script>
    function ctx() {
      if (!window._actx) window._actx = new (window.AudioContext || window.webkitAudioContext)();
      if (window._actx.state === 'suspended') window._actx.resume();
      return window._actx;
    }

    // ── Current ──────────────────────────────────────────────────────────────
    function playCurrent() {
      const c = ctx(), t = c.currentTime;
      [196.00, 164.81, 130.81].forEach((freq, i) => {
        const osc = c.createOscillator(), g = c.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, t + i * 0.15);
        g.gain.setValueAtTime(0, t + i * 0.15);
        g.gain.linearRampToValueAtTime(0.1, t + i * 0.15 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.2);
        osc.connect(g); g.connect(c.destination);
        osc.start(t + i * 0.15); osc.stop(t + i * 0.15 + 0.25);
      });
    }

    // ── Option 1: Soft thud ───────────────────────────────────────────────────
    // Single sine at 80 Hz, punchy attack, short decay. Like a camera shutter.
    function playOption1() {
      const c = ctx(), t = c.currentTime;
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(90, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.15);
      g.gain.setValueAtTime(0.25, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.connect(g); g.connect(c.destination);
      osc.start(t); osc.stop(t + 0.25);
    }

    // ── Option 2: Tape stop ───────────────────────────────────────────────────
    // Sine starting at 300 Hz, gliding down to near-silence over ~0.5s.
    function playOption2() {
      const c = ctx(), t = c.currentTime;
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(320, t);
      osc.frequency.exponentialRampToValueAtTime(50, t + 0.55);
      g.gain.setValueAtTime(0.18, t);
      g.gain.setValueAtTime(0.18, t + 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      osc.connect(g); g.connect(c.destination);
      osc.start(t); osc.stop(t + 0.6);
    }

    // ── Option 3: Two-tone confirm ────────────────────────────────────────────
    // Sine E4 (330 Hz) → C4 (262 Hz), short and clean.
    function playOption3() {
      const c = ctx(), t = c.currentTime;
      [[330, 0], [262, 0.18]].forEach(([freq, delay]) => {
        const osc = c.createOscillator(), g = c.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t + delay);
        g.gain.setValueAtTime(0, t + delay);
        g.gain.linearRampToValueAtTime(0.15, t + delay + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.2);
        osc.connect(g); g.connect(c.destination);
        osc.start(t + delay); osc.stop(t + delay + 0.25);
      });
    }

    // ── Option 4: Click + low tone ────────────────────────────────────────────
    // White-noise burst (click) then a low 110 Hz sine that rings briefly.
    function playOption4() {
      const c = ctx(), t = c.currentTime;

      // Click: short noise burst
      const bufLen = Math.floor(c.sampleRate * 0.015);
      const buf = c.createBuffer(1, bufLen, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
      const click = c.createBufferSource(), gClick = c.createGain();
      click.buffer = buf;
      gClick.gain.setValueAtTime(0.4, t);
      gClick.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
      click.connect(gClick); gClick.connect(c.destination);
      click.start(t);

      // Low resonant tone
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(110, t + 0.01);
      g.gain.setValueAtTime(0, t + 0.01);
      g.gain.linearRampToValueAtTime(0.12, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.connect(g); g.connect(c.destination);
      osc.start(t + 0.01); osc.stop(t + 0.4);
    }

    // ── Option 5: Soft chime down ─────────────────────────────────────────────
    // Three triangle-wave notes: A4 (440) → F#4 (370) → D4 (294), gentle.
    function playOption5() {
      const c = ctx(), t = c.currentTime;
      [[440, 0], [370, 0.13], [294, 0.26]].forEach(([freq, delay]) => {
        const osc = c.createOscillator(), g = c.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, t + delay);
        g.gain.setValueAtTime(0, t + delay);
        g.gain.linearRampToValueAtTime(0.12, t + delay + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.35);
        osc.connect(g); g.connect(c.destination);
        osc.start(t + delay); osc.stop(t + delay + 0.4);
      });
    }
  </script>
</body>
</html>
